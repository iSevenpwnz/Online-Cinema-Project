# Test deployment workflow for cd-settings branch
name: Deploy to AWS EC2

on:
  push:
    branches: [main, develop, cd-testing, cd-settings]
  pull_request:
    branches: [main, develop, cd-testing, cd-settings]
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - develop
      - cd-testing
      - cd-settings

jobs:
  deploy:
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Debug - Show trigger info
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Head ref: ${{ github.head_ref }}"
          echo "Base ref: ${{ github.base_ref }}"
          echo "Is merged: ${{ github.event.pull_request.merged }}"
          echo "Workflow run conclusion: ${{ github.event.workflow_run.conclusion }}"

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 Host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          echo "Deploying branch: $BRANCH"
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            
            PROJECT_DIR="/home/ubuntu/src/online-cinema-project"
            REPO_URL="https://github.com/iSevenpwnz/Online-Cinema-Project.git"
            BRANCH="${{ github.head_ref || github.ref_name }}"
            
            echo "Deploying branch: $BRANCH"
            
            # Clone repo if it doesn't exist or is empty
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "Cloning repository..."
              rm -rf "$PROJECT_DIR"
              git clone "$REPO_URL" "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            else
              echo "Repository exists, updating..."
              cd "$PROJECT_DIR"
              git fetch origin
            fi
            
            # Checkout and reset to target branch
            echo "Checking out branch: $BRANCH"
            git checkout "$BRANCH" || git checkout -b "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"
            
            # Deploy with docker compose
            echo "Starting Docker containers..."
            docker compose -f docker-compose-prod.yml up -d --build
            
            echo "Deployment completed successfully for branch: $BRANCH"
          EOF
