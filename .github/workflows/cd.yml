name: Deploy to AWS EC2

on:
  push:
    branches:
      - develop
      - cd-setting
  pull_request:
    types: [closed]
    branches:
      - develop
      - cd-setting

# Запобігаємо одночасним деплоям
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 Host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Determine target branch
        id: branch
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref name: ${{ github.ref_name }}"
          echo "Ref: ${{ github.ref }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            BRANCH="${{ github.ref_name }}"
            echo "Push detected, using branch: $BRANCH"
          else
            BRANCH="${{ github.event.pull_request.base.ref }}"
            echo "PR merge detected, using base branch: $BRANCH"
          fi

          echo "Final branch: $BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Execute Deployment Script on EC2
        timeout-minutes: 25
        run: |
          echo "Deploying branch: ${{ steps.branch.outputs.branch }}"
          ssh -o ConnectTimeout=30 -o ServerAliveInterval=60 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
                'timeout 1200 bash /home/ubuntu/src/online-cinema-project/commands/deploy.sh ${{ steps.branch.outputs.branch }}'

      - name: Verify Deployment
        if: always()
        run: |
          echo "Verifying deployment status..."
          ssh -o ConnectTimeout=30 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
                'cd /home/ubuntu/src/online-cinema-project && bash commands/check-status.sh'
