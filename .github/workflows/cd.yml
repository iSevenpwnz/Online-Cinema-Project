# Test deployment workflow for cd-settings branch
name: Deploy to AWS EC2

on:
  push:
    branches: [main, develop, cd-testing, cd-settings]
  pull_request:
    branches: [main, develop, cd-testing, cd-settings]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Debug - Show trigger info
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Head ref: ${{ github.head_ref }}"
          echo "Is merged: ${{ github.event.pull_request.merged }}"

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 Host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Execute Deployment Script on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
                'DEPLOY_BRANCH=${{ github.head_ref || github.ref_name }} bash /home/ubuntu/src/online-cinema-project/commands/deploy.sh'
